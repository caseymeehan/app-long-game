<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in to your course</title>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #ffffff;">
    <tr>
      <td align="center" style="padding: 48px 24px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 520px;">
          <!-- Body -->
          <tr>
            <td style="padding: 0;">
              <p style="margin: 0 0 24px; font-size: 16px; line-height: 1.6; color: #111;">
                Here's your login link for <strong>AI for the Long Game</strong>. Click below to get into your course.
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="padding: 4px 0 32px;">
                    <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 36px; background-color: #111; color: #fff; text-decoration: none; border-radius: 6px; font-size: 16px; font-weight: 600;">
                      Log in now
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin: 0 0 6px; font-size: 14px; line-height: 1.6; color: #666;">
                This link expires in 1 hour. If you didn't request it, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 32px 0 0; border-top: 1px solid #eee;">
              <p style="margin: 0; font-size: 13px; color: #999;">
                AI for the Long Game &mdash; Use AI with confidence, no matter what changes next.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
